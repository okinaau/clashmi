tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  inet4-address:
    - 10.7.0.0/8
  
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  route-address:
    - 10.7.0.1/32

  # THE FIX: We exclude ONLY the 10.6.x.x half of your router's subnet.
  # This keeps your internet working, but forces 10.7.0.1 into the VPN.
  route-exclude-address:
    - 10.6.0.0/16

  mtu: 1280
  endpoint-independent-nat: true

rules:
  - IP-CIDR,10.7.0.1/32,DIRECT
  # THE FIX: Match the new rule here too
  - IP-CIDR,10.6.0.0/16,DIRECT
  - DOMAIN-KEYWORD,ani,PROXY
  - DOMAIN-SUFFIX,846969.xyz,PROXY
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  - DOMAIN-SUFFIX,itunes.apple.com,PROXY
  - MATCH,DIRECT
