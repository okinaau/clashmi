dns:
  enable: true
  listen: :53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # IMPORTANT: Prevent Clash from ever trying to resolve or hijack the loopback IP
  fake-ip-filter:
    - "10.7.0.1"
    - "+.lan"
    - "+.local"

tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  
  # TRICK: Set the TUN's own internal IP to a 172 range.
  # This prevents the '10.x.x.x' conflict with your router.
  inet4-address:
    - 172.19.0.1/30
  
  # Explicitly tell the TUN to host the SideStore IP
  loopback-address:
    - 10.7.0.1
  
  # Pluck ONLY the loopback IP into the tunnel's routing
  route-address:
    - 10.7.0.1/32

  # Ensure the rest of your 10.6.x.x network is left alone by the system kernel
  strict-route: false
  mtu: 1280

rules:
  # 1. SideStore Loopback (Must be DIRECT to stay on the device)
  - IP-CIDR,10.7.0.1/32,DIRECT
  
  # 2. Bypass your local router subnet
  - IP-CIDR,10.6.0.0/15,DIRECT
  
  # 3. Proxy Apple services through ProtonVPN
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  - DOMAIN-SUFFIX,itunes.apple.com,PROXY
  
  - MATCH,DIRECT
