tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  # 1. THE FIX: Mimic LocalDevVpn's exact subnet to win the iOS routing priority
  inet4-address:
    - 10.7.0.10/24
  
  # 2. Let the Clash core natively handle the lockdown handshake
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  # 3. Explicitly tell the OS routing table to push this IP into the TUN
  route-address:
    - 10.7.0.1/32

  mtu: 4064
  gso: false
  gso-max-size: 0
  iproute2-table-index: 0
  iproute2-rule-index: 0
  auto-redirect-input-mark: 0
  auto-redirect-output-mark: 0
  endpoint-independent-nat: false
  udp-timeout: 0
  disable-icmp-forwarding: false
  file-descriptor: 5
  recvmsgx: true
  sendmsgx: false

rules:
  - MATCH,DIRECT
