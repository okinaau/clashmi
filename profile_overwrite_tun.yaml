tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  inet4-address:
    - 10.7.0.2/30
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  route-address:
    - 10.7.0.1/32

  mtu: 4064
  gso: false
  gso-max-size: 0
  iproute2-table-index: 0
  iproute2-rule-index: 0
  auto-redirect-input-mark: 0
  auto-redirect-output-mark: 0
  endpoint-independent-nat: false
  udp-timeout: 0
  disable-icmp-forwarding: false
  file-descriptor: 5
  recvmsgx: true
  sendmsgx: false

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - DST-PORT,5353,DIRECT
  - DOMAIN-KEYWORD,sidestore,DIRECT
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,apple-dns.net,PROXY
  - MATCH,DIRECT
