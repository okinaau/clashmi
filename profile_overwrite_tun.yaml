tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  # 1. THE FIX: Mimic LocalDevVpn's exact subnet to win the iOS routing priority
  inet4-address:
    - 10.7.0.10/24
  
  # 2. Let the Clash core natively handle the lockdown handshake
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  # 3. Explicitly tell the OS routing table to push this IP into the TUN
  route-address:
    - 10.7.0.1/32

  mtu: 4064
  gso: false
  gso-max-size: 0
  iproute2-table-index: 0
  iproute2-rule-index: 0
  auto-redirect-input-mark: 0
  auto-redirect-output-mark: 0
  endpoint-independent-nat: false
  udp-timeout: 0
  disable-icmp-forwarding: false
  file-descriptor: 5
  recvmsgx: true
  sendmsgx: false

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT
  
  # 4. Tightly scoped home router rule instead of the hazardous 10.0.0.0/8
  - IP-CIDR,10.6.0.0/15,DIRECT 
  
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - DST-PORT,5353,DIRECT
  - DOMAIN-KEYWORD,sidestore,DIRECT
  
  # 5. Apple services forced through the VPN to bypass your ISP
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,apple-dns.net,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  
  - MATCH,DIRECT
