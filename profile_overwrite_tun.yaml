tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  # THE HOLY GRAIL: Exact replication of LocalDevVpn
  inet4-address:
    - 10.7.0.0/8
  
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  # Force ONLY the SideStore target IP into the tunnel
  route-address:
    - 10.7.0.1/32

  # CRITICAL: Prevent the massive /8 subnet from hijacking your 10.6.0.1 router
  route-exclude-address:
    - 10.6.0.0/15

  mtu: 1280
  endpoint-independent-nat: true

rules:
  - IP-CIDR,10.7.0.1/32,DIRECT
  - IP-CIDR,10.6.0.0/15,DIRECT
  - DOMAIN-KEYWORD,ani,PROXY
  - DOMAIN-SUFFIX,846969.xyz,PROXY
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  - DOMAIN-SUFFIX,itunes.apple.com,PROXY
  - MATCH,DIRECT
