tun:
  enable: true
  stack: system  # System stack is more reliable for SideStore's specific handshake
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  # 1. THE FIX: Assign the TUN a completely different internal IP. 
  # This prevents the "Interface vs Destination" conflict.
  inet4-address:
    - 172.19.0.1/30
  
  # 2. This tells Clash: "If you see traffic for 10.7.0.1, hijack it."
  loopback-address:
    - 10.7.0.1
  
  # 3. This forces the iOS Routing Table to send 10.7.0.1 into this TUN interface.
  route-address:
    - 10.7.0.1/32

  mtu: 1280
  strict-route: false # False allows the loopback to 'reflect' properly
  endpoint-independent-nat: true

rules:
  # 4. RULE PRIORITY: We put the loopback logic at the VERY TOP.
  # We tell Clash: "Treat 10.7.0.1 as a DIRECT connection." 
  # In Clash, DIRECT + loopback-address = "Handle this internally."
  - IP-CIDR,10.7.0.1/32,DIRECT

  # 5. Handle your local network. 
  # Since your network is 10.6.0.0/15, we cover it all BUT the rule above takes priority.
  - IP-CIDR,10.6.0.0/15,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  
  - DOMAIN-SUFFIX,local,DIRECT
  - DST-PORT,5353,DIRECT
  - DOMAIN-KEYWORD,sidestore,DIRECT
  
  # 6. APP REFRESH FIX: Force all Apple validation traffic through your PROXY.
  # This changes your IP address to bypass ISP restrictions.
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  - DOMAIN-SUFFIX,itunes.apple.com,PROXY
  - DOMAIN-KEYWORD,apple-cloudkit,PROXY
  
  - MATCH,DIRECT
