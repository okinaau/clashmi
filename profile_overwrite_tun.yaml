tun:
  enable: true
  stack: system
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  
  # 1. Break the Kernel Collision: 
  # We move the TUN's actual interface IP entirely out of the 10.x.x.x range.
  inet4-address:
    - 198.18.0.2/30
  
  # 2. Keep your required loopback IP untouched.
  loopback-address:
    - 10.7.0.1
  
  strict-route: false

  # 3. Force iOS to inject ONLY this specific IP into the TUN, 
  # bypassing the Wi-Fi's /15 blanket claim.
  route-address:
    - 10.7.0.1/32

  mtu: 4064
  gso: false
  gso-max-size: 0
  iproute2-table-index: 0
  iproute2-rule-index: 0
  auto-redirect-input-mark: 0
  auto-redirect-output-mark: 0
  endpoint-independent-nat: false
  udp-timeout: 0
  disable-icmp-forwarding: false
  file-descriptor: 5
  recvmsgx: true
  sendmsgx: false

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT
  
  # 4. Remove the massive 10.0.0.0/8 rule. 
  # Replace it with your exact LAN subnet so 10.7.0.1 doesn't get kicked out to Wi-Fi.
  - IP-CIDR,10.6.0.0/15,DIRECT
  
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - DST-PORT,5353,DIRECT
  - DOMAIN-KEYWORD,sidestore,DIRECT
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,apple-dns.net,PROXY
  - MATCH,DIRECT
