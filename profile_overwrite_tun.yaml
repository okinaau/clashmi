tun:
  enable: true
  # SWITCH TO GVISOR: It's more aggressive at capturing 'local' traffic
  stack: gvisor  
  device: Clash Mi
  auto-route: true
  auto-detect-interface: true
  
  # 1. Direct Ownership: We make the TUN interface OWN 10.7.0.1
  inet4-address:
    - 10.7.0.0/32
  
  # 2. Explicit Loopback
  loopback-address:
    - 10.7.0.1
  
  # 3. Force iOS to prioritize this route over your Wi-Fi's /15
  strict-route: true
  
  # 4. Standard MTU to prevent fragmentation
  mtu: 1280
  
  dns-hijack:
    - any:53

rules:
  # 5. REMOVE the 10.0.0.0/8 rule if you had it. It's too greedy.
  # We ONLY want your specific router range to be DIRECT.
  - IP-CIDR,10.6.0.0/15,DIRECT
  
  # 6. Specifically keep the loopback inside the phone
  - IP-CIDR,10.7.0.1/32,DIRECT
  
  # VPN rules for Apple (the part LocalDevVpn can't do)
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,icloud.com,PROXY
  - DOMAIN-SUFFIX,mzstatic.com,PROXY
  - DOMAIN-SUFFIX,itunes.apple.com,PROXY
  
  - MATCH,DIRECT
